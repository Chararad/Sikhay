<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" />
  	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Modern Antiqua:wght@400&display=swap" />
  	<link rel="stylesheet" href="style.css">


</head>
<body>
    <div class="Main-bg">
        <img src="Assets/Don-Honorio 1-1.png" class="background" alt="">
    </div>

    <div class="layout">
        <div class="navbar-parent">
            <div class="navbar-left">
                <div class="hamburger-icon-btn">
                    <img src="Assets/hamburger.svg" class="hamrburger-icon" alt="">
                </div>

                <div class="web-logo">
                    <img src="" class="web-logo-icon" alt="">
                </div>

                <div class="sikhay-wrapper">
                    <div class="sikhay">SIKHAY</div>
                </div>

            </div>

            <div class="navbar-mid">
                <div class="searchbar-wrapper">
                    <input type="text" class="searchbar" placeholder="Search...">
                    <button class="search-btn">
                        <img src="Assets/search.svg" class="search-btn-icon" alt="">
                    </button>
                </div>
            </div>

            <div class="navbar-right">
                <button class="create-btn">
                    <div class="create-placeholder">+ Create</div>
                </button>
                <a href="#" class="chat-icon">
                    <img src="Assets/Chat_Circle.svg" alt="">
                </a>

                <a href="#" class="bell-icon">
                    <img src="Assets/Bell.svg" alt="">
                </a>

                <div class="profile-container">
                    <a href="#" class="profile-frame">
                        <img src="Assets/testprofile.png" class="user-avatar" alt="">
                    </a>
                </div>
            </div>
        </div>

        <div class="content-parent">
            <div class="feed-container">
                <div class="post">
                    
                </div>
                <div class="post"></div>
                <div class="post"></div>
                <div class="post"></div>
                <div class="post"></div>
            </div>

            <div class="sidebar-container">
                <div class="popular-resources-container">
                    <div class="popular-resources-wrapper"> <!--onclick-->
                        <b class="text1">Popular Resources</b>
                        <div class="top-resources-container">
                            <div class="top-resource1">
                                <div class="top-resource1-wrapper" >
                                    <img src="Assets/notebook-1.svg" class="resource-icon1" alt="">
                                    <div class="resource-title1">Resource1</div>
                                    <div class="heart-group1">
                                        <img src="Assets/heart-1.svg" class="heart-icon1" alt="">
                                        <div class="number-of-hearts1">6k</div>
                                    </div>
                                    
                                </div>
                            </div>
                            <div class="top-resource2">
                                <div class="top-resource2-wrapper">
                                    <img src="Assets/notebook-1.svg" class="resource-icon2" alt="">
                                    <div class="resource-title2">Resource2</div>
                                    <div class="heart-group2">
                                        <img src="Assets/heart-1.svg" class="heart-icon2" alt="">
                                        <div class="number-of-hearts2">3k</div>
                                    </div>
                                    
                                </div>
                            </div>
                            <div class="top-resource3">
                                <div class="top-resource3-wrapper">
                                    <img src="Assets/notebook-1.svg" class="resource-icon3" alt="">
                                    <div class="resource-title3">Resource3</div>
                                    <div class="heart-group3">
                                        <img src="Assets/heart-1.svg" class="heart-icon3" alt="">
                                        <div class="number-of-hearts3">2k</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <i class="see-more1">See more...</i>
                    </div>
                </div>

                <div class="contributors-container">
                    <div class="top-contributors-wrapper"> <!--onclick-->
                        <b class="text2">Top contributors</b>
                        <div class="top-contributors-container">
                            <div class="top-contributor1">
                                <div class="top-contributor1-wrapper">
                                    <img src="Assets/Profile-pic.svg" class="contributor-icon1" alt="">
                                    <div class="contributor-title1">Jester Dayao</div>
                                    <div class="heart-group4">
                                        <img src="Assets/heart-1.svg" class="heart-icon4" alt="">
                                        <div class="number-of-hearts4">3k</div>
                                    </div>
                                </div>                    
                            </div>
                            <div class="top-contributor2">
                                <div class="top-contributor2-wrapper">
                                    <img src="Assets/Profile-pic.svg" class="contributor-icon2" alt="">
                                    <div class="contributor-title2">Username</div>
                                    <div class="heart-group5">
                                        <img src="Assets/heart-1.svg" class="heart-icon5" alt="">
                                        <div class="number-of-hearts5">1.5k</div>
                                    </div>
                                </div>
                            </div>
                            <div class="top-contributor3">
                                <div class="top-contributor3-wrapper">
                                    <img src="Assets/Profile-pic.svg" class="contributor-icon3" alt="">
                                    <div class="contributor-title3">Username</div>
                                    <div class="heart-group6">
                                        <img src="Assets/heart-1.svg" class="heart-icon6" alt="">
                                        <div class="number-of-hearts6">700</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <i class="see-more2">See more...</i>
                    </div>
                </div>
                <div class="footer">
                    <div class="links">
                        <a href="#"><i class="terms-and-conditions">Terms and Conditions</i></a>
                        <div class="small-circle"></div>
                        <a href="#"><i class="privacy-policy">Privacy Policy</i></a>
                    </div>
                    <div class="company">
                        <div class="psu">© 2026 Pampanga State University.</div>
                        <div class="alr">All Rights Reserved.</div>
                    </div>
                </div>
            </div>

        </div>

    </div>
</body>
</html>
