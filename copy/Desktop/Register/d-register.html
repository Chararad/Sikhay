<!DOCTYPE html>
<html>
<head>
  	<meta charset="utf-8">
  	<meta name="viewport" content="initial-scale=1, width=device-width">
  	
  	<link rel="stylesheet"  href="/Styles/desktop-css/d-register.css" />
  	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;600&display=swap" />
  	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=42dot Sans:wght@400&display=swap" />
  	
  	<link rel="stylesheet" href="d-register.css">
  	
</head>
<body>
  	
  	<div class="desktop">
    		<img src="Assets/Don-Honorio-Ventura-State-University_8b0167a5305778d81713f6e47ec6de10.jpg" class="desktop-child" alt="">
    		
    		<div class="footer-2">
      			<img src="Assets/pampanga-state-u-logo-small.webp" class="pampanga-state-u-logo-small-1-icon" alt="">
      			
      			<div class="text">
        				<div class="company">
          					<div class="pampanga-state-university">© 2026 Pampanga State University. All Rights Reserved. </div>
        				</div>
        				<div class="nav">
          					<div class="learn-more"><a href="#">Learn more</a></div>
          					<div class="learn-more"><a href="#">Support</a></div>
        				</div>
      			</div>
      			<div class="social-links">
						<a href="#">
							<img src="Assets/facebook.svg" class="social-link-1" alt="">
						</a>
        				
        				<a href="#">
							<img src="Assets/youtube.svg" class="social-link-2" alt="">
						</a>
        				<div class="social-link-3">
        				</div>
      			</div>
    		</div>
    		<div class="sign-up-parent">
      			<div class="sign-up">Sign up</div>
      			<button class="register-wrapper">
        				<div class="register">Register</div>
      			</button>
      			<div class="group-parent">
        				<div class="frame-parent">
          					<div class="email-parent">
            						<div class="email">Email</div>
            						<input type="email" class="pampangastateueduph-parent" placeholder="username@pampangastateu.edu.ph" required>
          					</div>
          					<div class="password-parent">
            						<div class="email">Password</div>
            						<input type="password" class="password-group" placeholder="Password">
          					</div>
        				</div>
        				<div class="confirm-password-parent">
          					<div class="email">Confirm Password</div>
          					<input type="password" class="password-group" placeholder="Confirm Password">
          					
        				</div>
      			</div>
      			<div class="group-container">
        				<div class="frame-wrapper">
          					<div class="email-parent">
            						<div class="email">Middle Name</div>
            						<input type="text" class="pampangastateueduph-parent" placeholder="Enter Your Middle Name">
          					</div>
        				</div>
      			</div>
      			<div class="group-frame">
        				<div class="frame-wrapper">
          					<div class="email-parent">
            						<div class="first">First Name </div>
            						<input type="text" class="pampangastateueduph-parent" placeholder="Enter Your First Name" required>
          					</div>
        				</div>
      			</div>
      			<div class="group-wrapper2">
        				<div class="frame-wrapper">
          					<div class="email-parent">
            						<div class="email">Last Name</div>
            						<input type="text" class="pampangastateueduph-parent" placeholder="Enter Your Last Name" required>
          					</div>
        				</div>
      			</div>
      			<div class="group-parent2">
        				<div class="frame-wrapper3">
          					<div class="email-parent">
            						<div class="email">Sex</div>
            						<select id="sex" name="sex" class="pampangastateueduph-parent4">
              							<option value="" disabled selected>Sex</option>
										<option value="m">Male</option>
										<option value="f">Female</option>
            						</select>
          					</div>
        				</div>
        				<div class="group-wrapper3">
          					<div class="frame-wrapper">
            						<div class="email-parent">
              							<div class="email">Campus</div>
              							<select id="campus" name="campus" class="pampangastateueduph-parent">
                								<option value="" disabled selected>Campus</option>
												<option value="Main">Main Campus</option>
              							</select>
            						</div>
          					</div>
        				</div>
      			</div>
    		</div>
  	</div>
  	
  	
  	
  	
</body>
</html>
