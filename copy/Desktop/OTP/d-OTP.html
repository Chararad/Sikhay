<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OTP Verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="d-OTP.css">
</head>
<body>
    <img src="Don-Honorio-Ventura-State-University_8b0167a5305778d81713f6e47ec6de10.jpg" class="background-img" alt="Background">
    <div class="background-overlay"></div>

    <main class="main-content">
        <div class="otp-card">
            <h1>OTP Verification</h1>
            <p>We have sent the verification code to<br>your email address</p>
            
            <div class="otp-inputs">
                <input class="otp-box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" value="8" aria-label="OTP digit 1">
                <input class="otp-box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" value="5" aria-label="OTP digit 2">
                <input class="otp-box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" value="2" aria-label="OTP digit 3">
                <input class="otp-box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="OTP digit 4">
            </div>

            <button class="confirm-btn">Confirm</button>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-logo">
            <img src="pampanga-state-u-logo-small.webp" alt="Pampanga State University Logo" class="footer-logo-img">
        </div>
        
        <div class="footer-center">
            <span>© 2026 Pampanga State University. All Rights Reserved.</span>
            <a href="#">Learn more</a>
            <a href="#">Support</a>
        </div>
		

        <div class="footer-socials">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c5.05-.5 9-4.76 9-9.95z"/>
            </svg>
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M21.58 7.19c-.23-.86-.91-1.54-1.77-1.77C18.25 5 12 5 12 5s-6.25 0-7.81.42c-.86.23-1.54.91-1.77 1.77C2 8.75 2 12 2 12s0 3.25.42 4.81c.23.86.91 1.54 1.77 1.77C5.75 19 12 19 12 19s6.25 0 7.81-.42c.86-.23 1.54-.91 1.77-1.77C22 15.25 22 12 22 12s0-3.25-.42-4.81zM10 15V9l5.2 3-5.2 3z"/>
            </svg>
        </div>
    </footer>

</body>
</html>
