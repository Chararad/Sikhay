<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OTP Verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="d-OTP.css">
</head>
<body>
    <img src="Don-Honorio-Ventura-State-University_8b0167a5305778d81713f6e47ec6de10.jpg" class="background-img" alt="Background">
    <div class="background-overlay"></div>

    <main class="main-content">
        <div class="otp-card">
            <h1>OTP Verification</h1>
            <p>We have sent the verification code to<br>your email address</p>
            
            <div class="otp-inputs">
                <input class="otp-box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" value="8" aria-label="OTP digit 1">
                <input class="otp-box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" value="5" aria-label="OTP digit 2">
                <input class="otp-box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" value="2" aria-label="OTP digit 3">
                <input class="otp-box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="OTP digit 4">
            </div>

            <button class="confirm-btn">Confirm</button>
        </div>
    </main>

    
 <div class="company-parent">
         <div class="company2">
            <div class="pampanga-state-university">
               © 2026 Pampanga State University. All Rights Reserved.
            </div>
         </div>
         <div class="learn-more-group">
            <div class="learn-more">Learn more</div>
            <div class="support2">Support</div>
            <div class="terms-and-conditions2">Terms and Conditions</div>
            <div class="privacy-policy2">Privacy Policy</div>
         </div>

      </div>
   </div>
   <div class="social-links">
        <img class="social-link-1"  src="facebook.svg">
        <img class="social-link-2" src="youtube.svg" alt="">
        <img class="social-link-3" src = "email.png" alt="">
       
      </div>
        <div class="social-links">
        <img class="social-link-1"  src="facebook.svg" alt="Facebook">
        <img class="social-link-2" src="youtube.svg" alt="YouTube">
       <img class="social-link-3" src="email.png" alt="Email">

        </div>

</body>
</html>
