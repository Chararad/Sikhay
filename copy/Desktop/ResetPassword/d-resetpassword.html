<!DOCTYPE html>
<html>
<head>
  	<meta charset="utf-8">
  	<meta name="viewport" content="initial-scale=1, width=device-width">
  	
  	<link rel="stylesheet"  href="/Styles/desktop-css/d-resetpassword.css" />
  	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;600;700&display=swap" />
  	
  	<link rel="stylesheet" href="d-resetpassword.css">
  	
</head>
<body>
  	
  	<div class="desktop">
    	<img src="Assets/Don-Honorio-Ventura-State-University_8b0167a5305778d81713f6e47ec6de10.jpg" class="desktop-child" alt="">
    		
		<div class="reset-password-wrapper">
    		<div class="reset-password-parent">
      			<div class="reset-password">Reset Password</div>
      			<div class="rectangle-parent">
        			<button class="group-child">
						<b class="confirm">Confirm</b>
					</button>
      			</div>
      			<div class="group-parent">
    				<div class="frame-parent">
      					<div class="group-item"></div>
          				<div class="new-password-parent">
    						<div class="new-password">New Password</div>
            				<input type="password" class="password-parent" placeholder="Password">
              				<!--<img src="Assets/clarity_eye-hide-line.svg" class="clarityeye-hide-line-icon" alt=""> -->
        				</div>
    				</div>
    				<div class="confirm-password-parent">
      					<div class="new-password">Confirm Password</div>
        				<input type="password" class="password-parent" placeholder="Confirm Password">
    					<!--<img src="Assets/clarity_eye-hide-line.svg" class="clarityeye-hide-line-icon" alt=""> -->
    				</div>
  				</div>
			</div>
		</div>

    	<div class="footer-2">
      		<img src="Assets/pampanga-state-u-logo-small.webp" class="pampanga-state-u-logo-small-1-icon" alt="">
      		<div class="text">
    			<div class="company">
          			<div class="pampanga-state-university">© 2026 Pampanga State University. All Rights Reserved. </div>
				</div>
        		<div class="nav">
        			<div class="learn-more"><a href="#">Learn more</a></div>
          			<div class="learn-more"><a href="#">Support</a></div>
        		</div>
      		</div>
      		<div class="social-links">
				<a href="#">
					<img src="Assets/facebook.svg" class="social-link-1" alt="">
				</a>
        		<a href="#">
					<img src="Assets/youtube.svg" class="social-link-2" alt="">
				</a>
        		<div class="social-link-3"></div>
      		</div>
    	</div>
	</div>

</body>
</html>
