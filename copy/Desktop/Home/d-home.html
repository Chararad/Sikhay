<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="d-home.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;600;700;900&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Modern+Antiqua&display=swap" />
</head>
<body>
  <div class="desktop">
    <img src="Don-Honorio-Ventura-State-University_8b0167a5305778d81713f6e47ec6de10.jpg" style="width: 100%;"
         class="desktop-child" alt="">

    <div class="footer-2">
      <img class="pampanga-state-u-logo-small-1-icon" src="image.png" alt="">
      <div class="text">
        <div class="company">
          <div class="pampanga-state-university">Pampanga State University</div>
        </div>
        <div class="nav">
          <div class="learn-more">Learn more</div>
          <div class="learn-more">Support</div>
        </div>
      </div>
      <div class="social-links">
        <img class="social-link-1"  src="facebook.svg" alt="Facebook">
        <img class="social-link-2" src="youtube.svg" alt="YouTube">
       <img class="social-link-3" src="email.png" alt="Email">

        </div>
      </div>
    </div>

    <div class="sikhay-wrapper">
      <div class="sikhay">SIKHAY</div>
    </div>

    <div class="ellipse-parent">
      <div class="frame-child"></div>
      <div class="login-parent">
        <b class="login">Login</b>

        <form id="login" class="frame-parent">
          <div class="email-parent">
            <label class="login" for="email">Email</label>
            <input type="email" id="email" name="email"
                   placeholder="username@pampangastateu.edu.ph"
                   class="input-field" required>
          </div>

          <div class="password-parent">
            <label class="login" for="password">Password</label>
            <input type="password" id="password" name="password"
                   placeholder="Password"
                   class="input-field" required>
          </div>

          <div class="forgot-password">Forgot Password?</div>

          <div class="sign-in-wrapper">
            <button type="submit" class="sign-in">Sign in</button>
          </div>
        </form>

        <div class="dont-have-an-container">
          <span>Don’t have an account yet? </span>
          <span class="register-for-free">Register for free</span>
        </div>
      </div>
    </div>
  </div>

  <script src="Script/desktop-home.js"></script>
</body>
</html>
