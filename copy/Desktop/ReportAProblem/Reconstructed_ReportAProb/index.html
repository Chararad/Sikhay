<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report A Problem</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;600;700;800;900&display=swap" />
  	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Modern Antiqua:wght@400&display=swap" />
  	<link rel="stylesheet" href="style.css" />

</head>
<body>
    <!--Main Background (Main Parent)-->
    <div class="main-bg">

        <!--Nav Bar-->
        <div class="navigation">
            <div class="navigation-left">
                <div class="web-logo"></div>
                <div class="sikhay-wrapper">
                    <div class="sikhay">SIKHAY</div>
                </div>
            </div>
        </div>

        <div class="first-text">Report A Problem</div>
        <div class="first-text-divider"></div>

        <div class="report-details-container">
            <b class="text2">Report Details</b>

            <select class="type-of-report">
                <option value="" id="type" name="type" selected disabled>Type of Report....</option>
                <option value="profile">Profile</option>
                <option value="website">Website</option>
                <option value="user">Other User</option>
                <option value="shared">Shared Resources</option>
                <option value="post">Post</option>
            </select>

            <div class="text4">Describe The Issue</div>
            <textarea class="report-description" placeholder="Please describe the issue that you are facing. Include any relevant information."></textarea>
       
            <div class="text5">Photo Evidence</div>
            <div class="upload-container">
                <div class="upload-wrapper">
                    <label for="upload">
                        <img src="iconicc/image copy 2.png" class="upload-icon" alt="">
                    </label>
                    <input type="file" id="upload" accept="image/*" hidden>
                </div>
            </div>
            
            <div class="submit-container">
                <button class="submit-btn">
                    <div class="submit">Submit Report</div>
                </button>
            </div>
        </div>


        <div class="footer-container">
            <div class="footer-left">
                <div class="text3">© 2026 Pampanga State University. All Rights Reserved.</div>
            </div>
            <div class="footer-right">
                <div class="learn-more"><a href="#">Learn more</a></div>
        		<div class="support"><a href="#">Support</a></div>
        		<div class="terms-and-conditions"><a href="#">Terms and Conditions</a></div>
        		<div class="privacy-policy"><a href="#">Privacy Policy</a></div>
            </div>
        </div>

    </div>
</body>
</html>
